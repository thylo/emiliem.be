<div class="c-workshops">
    <div class="c-workshops__content">
        <h1>{{page.title}}</h1>
        <ul class="o-list-bare">
            {% for workshop in page.workshops %}
            <li class="u-margin-bottom o-list-bare__item c-workshop">
                <h4>{{workshop.title}}</h4>
                <div>{{workshop.description}}</div>
            </li>
            {% endfor %}
        </ul>

        {% include prices.html prices=page.prices%}
    </div>
</div>
