<div class="o-wrapper">
    <h1>{{page.title}}</h1>
    <div>
        {{page.description}}
    </div>

    <ul class="u-padding-vertical-large o-list-bare">
        {%for service in page.services%}
        <li class="u-margin-bottom o-list-bare__item">
            <div class="o-layout">
                <div class="o-layout__item u-1/3@desktop">
                    <h3>{{service.title}}</h3>
                </div>
                <div class="o-layout__item u-2/3@desktop">
                    <div class="c-service__description">{{service.description}}</div>
                    <div class="c-service__prices">
                        {% include prices.html prices=service.prices %}
                    </div>
                </div>
            </div>
        </li>
        {%endfor%}
    </ul>
</div>
